name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }}, Py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Run Build Script
      shell: bash
      run: |
        # We use the build.py script we created to ensure consistency
        python build.py
        
    - name: Rename Artifact for Release
      shell: bash
      run: |
        # Identify the zip file created by build.py and rename it to include python version
        OS_TYPE=$(python -c "import platform; print(platform.system().lower())")
        if [ "$OS_TYPE" = "darwin" ]; then OS_TYPE="macos"; fi
        OLD_NAME="releases/speech-to-text-${OS_TYPE}.zip"
        NEW_NAME="speech-to-text-${OS_TYPE}-py${{ matrix.python-version }}.zip"
        mv "$OLD_NAME" "$NEW_NAME"
        echo "ASSET_PATH=$NEW_NAME" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: speech-to-text-${{ matrix.os }}-py${{ matrix.python-version }}
        path: ${{ env.ASSET_PATH }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            speech-to-text-*/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
